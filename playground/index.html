<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Txtcode Playground</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.2rem; color: #4ade80; }
    header span { font-size: 0.85rem; color: #9ca3af; }
    #run-btn {
      margin-left: auto;
      padding: 8px 20px;
      background: #4ade80;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #run-btn:hover { background: #22c55e; }
    #run-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      overflow: hidden;
    }
    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-title {
      padding: 6px 12px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    #editor-pane { border-right: 1px solid #0f3460; }
    .CodeMirror {
      flex: 1;
      height: 100%;
      font-size: 14px;
      background: #0d1117;
      color: #c9d1d9;
    }
    .CodeMirror-scroll { height: 100%; }
    #output {
      flex: 1;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      overflow-y: auto;
      white-space: pre-wrap;
      background: #0d1117;
      color: #c9d1d9;
    }
    #output .ok   { color: #4ade80; }
    #output .err  { color: #f87171; }
    #output .info { color: #60a5fa; font-style: italic; }
    #share-btn {
      padding: 4px 12px;
      font-size: 0.8rem;
      background: #374151;
      color: #d1d5db;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 8px;
    }
    #share-btn:hover { background: #4b5563; }
    #status { font-size: 0.75rem; color: #6b7280; margin-left: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>&#x1F4BB; Txtcode Playground</h1>
    <span>A security-native language platform</span>
    <span id="status">Loading...</span>
    <button id="share-btn" title="Copy shareable URL">Share</button>
    <button id="run-btn" disabled>&#x25B6; Run</button>
  </header>
  <main>
    <div class="pane" id="editor-pane">
      <div class="pane-title">Editor (.tc)</div>
      <textarea id="code-input"></textarea>
    </div>
    <div class="pane">
      <div class="pane-title">Output</div>
      <div id="output"><span class="info">Loading Txtcode runtime...</span></div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
