[package]
name = "txtcode"
version = "0.1.0"
edition = "2021"
authors = ["MD POOR"]
description = "Txt-code: A simple, memorable, security-focused programming language"
license = "MIT"
repository = "https://github.com/txtcode/txtcode"

[dependencies]
# Parser
nom = "7.1"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Serialization (for bytecode, AST)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
toml = "0.8"

# Cryptography (for security features)
aes-gcm = "0.10"
sha2 = "0.10"
md5 = "0.7"
rand = "0.8"
ring = "0.17"
hex = "0.4"
base64 = "0.21"

# Math
libm = "0.2"

# Networking (for stdlib)
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
hyper = { version = "1.0", features = ["full"] }

# File I/O
walkdir = "2.4"

# CLI
clap = { version = "4.4", features = ["derive"] }
colored = "2.1"

# REPL
rustyline = "14.0"

# Lazy static
lazy_static = "1.4"

# Directory utilities (for ~/.txtcode/ paths)
dirs = "5.0"

# Date/time utilities (for logging)
chrono = "0.4"

# Regular expressions
regex = "1.10"

# System calls (Unix)
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# LLVM (for native code generation) - optional
# llvm-sys = "170"

# WebAssembly - optional
# wasm-bindgen = "0.2"
# wasm-pack = "0.12"

[dev-dependencies]
criterion = "0.5"

[lib]
name = "txtcode"
path = "src/lib.rs"

