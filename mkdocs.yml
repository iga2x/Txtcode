site_name: Txt-code Documentation
site_description: A simple, memorable, security-focused programming language
site_url: https://iga2x.github.io/txtcode
repo_url: https://github.com/iga2x/txtcode
repo_name: iga2x/txtcode
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

docs_dir: docs

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Language Spec: language-spec.md
  - Syntax Reference: syntax-reference.md
  - Permissions: permissions.md
  - Security Features: security-features.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iga2x/txtcode
