site_name: Txtcode Documentation
site_description: "Txtcode — multipurpose, security-native programming language"
site_url: https://txtcode.dev/docs
repo_url: https://github.com/txtcode/txtcode
repo_name: txtcode/txtcode
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: cyan
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: cyan
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

docs_dir: docs

nav:
  - Getting Started: quick-start.md
  - Language Reference:
    - Language Spec: language-spec.md
    - Syntax Reference: syntax-reference.md
    - Async & Concurrency: async.md
  - Security:
    - Permissions: permissions.md
    - Security Features: security-features.md
  - Tools:
    - Benchmarking: performance.md
  - Stability Policy: stability.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/txtcode/txtcode
  version:
    provider: mike
