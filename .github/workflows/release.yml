name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on git tag like: git tag v0.1.0 && git push --tags

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: txtcode-linux-x86_64
            ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: txtcode-linux-arm64
            ext: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: txtcode-windows-x86_64
            ext: ".exe"

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: txtcode-macos-x86_64
            ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: txtcode-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/txtcode

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/txtcode${{ matrix.ext }} \
             ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
