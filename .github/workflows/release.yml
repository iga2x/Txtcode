name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on git tag like: git tag v0.1.0 && git push --tags

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: txtcode-linux-x86_64
            ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: txtcode-linux-arm64
            ext: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: txtcode-windows-x86_64
            ext: ".exe"

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: txtcode-macos-x86_64
            ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: txtcode-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/txtcode

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/txtcode${{ matrix.ext }} \
             ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Import GPG key
        if: env.GPG_PRIVATE_KEY != ''
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign binary (GPG)
        if: env.GPG_PRIVATE_KEY != '' && runner.os != 'Windows'
        run: |
          gpg --batch --yes --armor --detach-sign \
              ${{ matrix.artifact }}${{ matrix.ext }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Compute SHA256 checksum
        shell: bash
        run: |
          sha256sum ${{ matrix.artifact }}${{ matrix.ext }} \
            > ${{ matrix.artifact }}${{ matrix.ext }}.sha256 2>/dev/null || \
          shasum -a 256 ${{ matrix.artifact }}${{ matrix.ext }} \
            > ${{ matrix.artifact }}${{ matrix.ext }}.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}${{ matrix.ext }}
            ${{ matrix.artifact }}${{ matrix.ext }}.sha256
            ${{ matrix.artifact }}${{ matrix.ext }}.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
