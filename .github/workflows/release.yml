name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Linux x86_64 ─────────────────────────────────────────────────
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch_deb: amd64

          # ── Linux ARM64 ──────────────────────────────────────────────────
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            arch_deb: arm64
            cross_pkg: gcc-aarch64-linux-gnu

          # ── macOS x86_64 ─────────────────────────────────────────────────
          - label: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin

          # ── macOS ARM64 (Apple Silicon) ───────────────────────────────────
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin

          # ── Windows x86_64 ───────────────────────────────────────────────
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux ARM)
        if: matrix.cross_pkg != ''
        run: sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ── Strip (Linux / macOS) ──────────────────────────────────────────────
      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/txtcode

      # ── Get version from Cargo.toml ────────────────────────────────────────
      - name: Get version
        id: ver
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ═══════════════════════════════════════════════════════════════════════
      # LINUX packages: .tar.gz  +  .deb  +  bare binary (for self-update)
      # ═══════════════════════════════════════════════════════════════════════
      - name: Package Linux → .tar.gz
        if: runner.os == 'Linux'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.version }}
          LABEL=${{ matrix.label }}
          PKG="txtcode-${V}-${LABEL}.tar.gz"
          BARE="txtcode-${V}-${LABEL}"

          cp target/${{ matrix.target }}/release/txtcode txtcode

          # Bundle: binary + install.sh (from pkg/) + uninstall.sh (from repo root)
          tar -czf "$PKG" txtcode pkg/install.sh uninstall.sh \
            --transform "s|pkg/install.sh|install.sh|" \
            --transform "s|uninstall.sh|uninstall.sh|"

          rm txtcode
          echo "TAR_PKG=$PKG" >> "$GITHUB_ENV"
          sha256sum "$PKG" > "${PKG}.sha256"

          # Bare binary for self-update (no extraction needed)
          cp target/${{ matrix.target }}/release/txtcode "$BARE"
          echo "BARE_BIN=$BARE" >> "$GITHUB_ENV"
          sha256sum "$BARE" > "${BARE}.sha256"

      - name: Package Linux → .deb
        if: runner.os == 'Linux'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.version }}
          ARCH=${{ matrix.arch_deb }}
          PKG_DIR="deb_pkg"
          DEB_NAME="txtcode_${V}_${ARCH}.deb"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/local/bin"
          mkdir -p "${PKG_DIR}/usr/share/doc/txtcode"

          cp target/${{ matrix.target }}/release/txtcode "${PKG_DIR}/usr/local/bin/txtcode"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: txtcode
          Version: ${V}
          Architecture: ${ARCH}
          Maintainer: iga2x <noreply@github.com>
          Homepage: https://github.com/iga2x/Txtcode
          Description: Txt-code Programming Language
           A scripting language with arrow-based syntax, virtual environments,
           bytecode compilation, and a built-in package manager.
          EOF

          cat > "${PKG_DIR}/DEBIAN/postinst" << 'EOF'
          #!/bin/sh
          set -e
          echo "Txt-code installed. Run: txtcode --version"
          EOF
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          # postrm runs on dpkg --purge to clean up global data
          cat > "${PKG_DIR}/DEBIAN/postrm" << 'EOF'
          #!/bin/sh
          if [ "$1" = "purge" ]; then
            rm -rf "${HOME}/.txtcode" 2>/dev/null || true
          fi
          EOF
          chmod 755 "${PKG_DIR}/DEBIAN/postrm"

          cat > "${PKG_DIR}/usr/share/doc/txtcode/copyright" << EOF
          Txt-code v${V}
          https://github.com/iga2x/Txtcode
          EOF

          dpkg-deb --build "$PKG_DIR" "$DEB_NAME"
          echo "DEB_PKG=$DEB_NAME" >> "$GITHUB_ENV"
          sha256sum "$DEB_NAME" > "${DEB_NAME}.sha256"

      # ═══════════════════════════════════════════════════════════════════════
      # macOS package: .tar.gz  +  bare binary (for self-update)
      # ═══════════════════════════════════════════════════════════════════════
      - name: Package macOS → .tar.gz
        if: runner.os == 'macOS'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.version }}
          LABEL=${{ matrix.label }}
          PKG="txtcode-${V}-${LABEL}.tar.gz"
          BARE="txtcode-${V}-${LABEL}"

          cp target/${{ matrix.target }}/release/txtcode txtcode
          cp pkg/install.sh install.sh
          cp uninstall.sh uninstall.sh

          # macOS tar doesn't support --transform, use a staging dir
          mkdir -p stage
          cp txtcode stage/txtcode
          cp pkg/install.sh stage/install.sh
          cp uninstall.sh stage/uninstall.sh
          tar -czf "$PKG" -C stage .

          rm -rf stage txtcode install.sh uninstall.sh
          echo "TAR_PKG=$PKG" >> "$GITHUB_ENV"
          shasum -a 256 "$PKG" > "${PKG}.sha256"

          # Bare binary for self-update
          cp target/${{ matrix.target }}/release/txtcode "$BARE"
          echo "BARE_BIN=$BARE" >> "$GITHUB_ENV"
          shasum -a 256 "$BARE" > "${BARE}.sha256"

      # ═══════════════════════════════════════════════════════════════════════
      # Windows package: .zip  (binary + install.bat + uninstall.bat)
      #                + bare .exe  (for self-update)
      # ═══════════════════════════════════════════════════════════════════════
      - name: Package Windows → .zip
        if: runner.os == 'Windows'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.version }}
          PKG="txtcode-${V}-${{ matrix.label }}.zip"
          BARE_EXE="txtcode-${V}-${{ matrix.label }}.exe"

          cp target/${{ matrix.target }}/release/txtcode.exe txtcode.exe

          # install.bat — copies binary to %LOCALAPPDATA%\Programs\txtcode
          # and permanently adds it to the user PATH via registry
          cat > install.bat << 'EOF'
          @echo off
          setlocal enabledelayedexpansion

          echo.
          echo  Txt-code Installer
          echo  ==================
          echo.

          set "DEST=%LOCALAPPDATA%\Programs\txtcode"
          echo  Installing to: %DEST%
          echo.

          mkdir "%DEST%" 2>nul
          copy /Y "%~dp0txtcode.exe" "%DEST%\txtcode.exe" >nul
          if errorlevel 1 (
            echo  ERROR: Could not copy binary to %DEST%
            pause
            exit /b 1
          )

          :: Add to user PATH via registry (avoids setx 1024-char limit)
          for /f "skip=2 tokens=3*" %%a in ('reg query "HKCU\Environment" /v PATH 2^>nul') do (
            set "OLD_PATH=%%a %%b"
          )
          set "OLD_PATH=!OLD_PATH: =!"
          echo !OLD_PATH! | findstr /C:"%DEST%" >nul 2>&1
          if errorlevel 1 (
            if defined OLD_PATH (
              reg add "HKCU\Environment" /v PATH /t REG_EXPAND_SZ /d "%DEST%;!OLD_PATH!" /f >nul
            ) else (
              reg add "HKCU\Environment" /v PATH /t REG_EXPAND_SZ /d "%DEST%" /f >nul
            )
            echo  Added %DEST% to your PATH.
            echo  Restart your terminal for the PATH change to take effect.
          ) else (
            echo  PATH already contains %DEST%
          )

          echo.
          "%DEST%\txtcode.exe" --version
          echo.
          echo  Installation complete! Open a new terminal and run: txtcode repl
          echo.
          pause
          EOF

          # uninstall.bat — removes binary dir and PATH entry
          cat > uninstall.bat << 'EOF'
          @echo off
          setlocal enabledelayedexpansion

          echo.
          echo  Txt-code Uninstaller
          echo  ====================
          echo.

          set "DEST=%LOCALAPPDATA%\Programs\txtcode"
          echo  This will remove: %DEST%
          echo.
          set /p "CONFIRM=Proceed? [y/N]: "
          if /i not "%CONFIRM%"=="y" (
            echo Uninstall cancelled.
            pause
            exit /b 0
          )

          :: Remove from user PATH via registry
          for /f "skip=2 tokens=3*" %%a in ('reg query "HKCU\Environment" /v PATH 2^>nul') do (
            set "OLD_PATH=%%a %%b"
          )
          set "NEW_PATH=!OLD_PATH:%DEST%;=!"
          set "NEW_PATH=!NEW_PATH:;%DEST%=!"
          set "NEW_PATH=!NEW_PATH:%DEST%=!"
          if not "!NEW_PATH!"=="!OLD_PATH!" (
            reg add "HKCU\Environment" /v PATH /t REG_EXPAND_SZ /d "!NEW_PATH!" /f >nul
            echo  Removed from PATH.
          )

          :: Remove directory
          if exist "%DEST%" (
            rmdir /S /Q "%DEST%"
            echo  Removed %DEST%
          ) else (
            echo  %DEST% not found, may already be removed.
          )

          echo.
          echo  Txt-code uninstalled.
          pause
          EOF

          7z a "$PKG" txtcode.exe install.bat uninstall.bat
          echo "ZIP_PKG=$PKG" >> "$GITHUB_ENV"
          sha256sum "$PKG" > "${PKG}.sha256"

          # Bare .exe for self-update
          cp txtcode.exe "$BARE_EXE"
          echo "BARE_EXE=$BARE_EXE" >> "$GITHUB_ENV"
          sha256sum "$BARE_EXE" > "${BARE_EXE}.sha256"

      # ═══════════════════════════════════════════════════════════════════════
      # Upload all produced packages to the GitHub Release
      # ═══════════════════════════════════════════════════════════════════════
      - name: Upload Linux packages
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TAR_PKG }}
            ${{ env.TAR_PKG }}.sha256
            ${{ env.DEB_PKG }}
            ${{ env.DEB_PKG }}.sha256
            ${{ env.BARE_BIN }}
            ${{ env.BARE_BIN }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS packages
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TAR_PKG }}
            ${{ env.TAR_PKG }}.sha256
            ${{ env.BARE_BIN }}
            ${{ env.BARE_BIN }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows packages
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_PKG }}
            ${{ env.ZIP_PKG }}.sha256
            ${{ env.BARE_EXE }}
            ${{ env.BARE_EXE }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
