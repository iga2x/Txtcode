name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: txtcode-linux-x86_64
            pkg: txtcode-linux-x86_64.tar.gz
            ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: txtcode-linux-arm64
            pkg: txtcode-linux-arm64.tar.gz
            ext: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: txtcode-windows-x86_64
            pkg: txtcode-windows-x86_64.zip
            ext: ".exe"

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: txtcode-macos-x86_64
            pkg: txtcode-macos-x86_64.tar.gz
            ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: txtcode-macos-arm64
            pkg: txtcode-macos-arm64.tar.gz
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/txtcode

      - name: Package (Linux / macOS → .tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/txtcode txtcode
          tar -czf ${{ matrix.pkg }} txtcode
          rm txtcode

      - name: Package (Windows → .zip)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/txtcode.exe txtcode.exe
          7z a ${{ matrix.pkg }} txtcode.exe
          rm txtcode.exe

      - name: Compute SHA256 checksum
        shell: bash
        run: |
          sha256sum ${{ matrix.pkg }} > ${{ matrix.pkg }}.sha256 2>/dev/null || \
          shasum -a 256 ${{ matrix.pkg }} > ${{ matrix.pkg }}.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.pkg }}
            ${{ matrix.pkg }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
